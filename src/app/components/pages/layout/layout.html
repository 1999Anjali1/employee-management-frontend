<div class="flex h-screen bg-gray-50 overflow-hidden">

  <!-- Sidebar -->
  <div class="w-64 bg-white shadow-lg flex flex-col fixed h-full z-10">

    <!-- Logo -->
    <div class="flex items-center gap-3 px-6 py-5 border-b border-gray-100">
      <div class="w-10 h-10 bg-blue-600 rounded-xl flex items-center justify-center">
        <span class="text-white font-bold text-lg">EM</span>
      </div>
      <div>
        <h1 class="text-sm font-bold text-gray-800">Employee</h1>
        <p class="text-xs text-gray-400">Management System</p>
      </div>
    </div>

    <!-- Navigation -->
   <!-- Navigation -->
<nav class="flex-1 px-4 py-4 overflow-y-auto">

  <p class="text-xs font-semibold text-gray-400 uppercase tracking-wider px-2 mb-2">Main</p>

  <button (click)="navigate('/dashboard')"
    [class]="isActive('/dashboard') ?
      'w-full flex items-center gap-3 px-3 py-2.5 rounded-lg bg-blue-50 text-blue-600 font-medium text-sm mb-1' :
      'w-full flex items-center gap-3 px-3 py-2.5 rounded-lg text-gray-600 hover:bg-gray-50 font-medium text-sm mb-1'">
    <ng-icon name="heroSquares2x2" class="text-xl flex-shrink-0"></ng-icon>
    Dashboard
  </button>

  <button (click)="navigate('/employees')"
    [class]="isActive('/employees') ?
      'w-full flex items-center gap-3 px-3 py-2.5 rounded-lg bg-blue-50 text-blue-600 font-medium text-sm mb-1' :
      'w-full flex items-center gap-3 px-3 py-2.5 rounded-lg text-gray-600 hover:bg-gray-50 font-medium text-sm mb-1'">
    <ng-icon name="heroUsers" class="text-xl flex-shrink-0"></ng-icon>
    Employees
  </button>

  <button (click)="navigate('/employees/add')"
    [class]="isActive('/employees/add') ?
      'w-full flex items-center gap-3 px-3 py-2.5 rounded-lg bg-blue-50 text-blue-600 font-medium text-sm mb-1' :
      'w-full flex items-center gap-3 px-3 py-2.5 rounded-lg text-gray-600 hover:bg-gray-50 font-medium text-sm mb-1'">
    <ng-icon name="heroUserPlus" class="text-xl flex-shrink-0"></ng-icon>
    Add Employee
  </button>

</nav>

  </div>

  <!-- Main Content -->
  <div class="flex-1 ml-64 flex flex-col overflow-hidden">

    <!-- Top Navbar -->
    <header class="bg-white shadow-sm px-6 py-4 flex justify-between items-center">
      <div>
        <h2 class="text-lg font-bold text-gray-800">{{ getPageTitle() }}</h2>
        <p class="text-xs text-gray-400">{{ getPageSubtitle() }}</p>
      </div>

      <!-- Right side — Profile + Logout -->
      <div class="flex items-center gap-3">
        <div class="text-right">
          <p class="text-sm font-medium text-gray-700">{{ userName }}</p>
          <p class="text-xs text-gray-400">{{ currentDate }}</p>
        </div>
        <!-- Profile Avatar -->
        <button (click)="navigate('/profile')"
          class="w-9 h-9 rounded-full bg-blue-100 hover:bg-blue-200 flex items-center justify-center text-blue-600 font-semibold text-sm transition-colors"
          title="Profile">
          {{ getInitials() }}
        </button>
        <!-- Logout Button -->
        <button (click)="logout()"
  class="flex items-center gap-2 bg-red-50 hover:bg-red-100 text-red-500 font-medium py-2 px-4 rounded-lg text-sm transition-colors">
  <ng-icon name="heroArrowRightOnRectangle" class="text-lg"></ng-icon>
  Logout
</button>
      </div>
    </header>

    <!-- Page Content -->
    <main class="flex-1 overflow-y-auto">
      <router-outlet />
    </main>

  </div>

</div>
