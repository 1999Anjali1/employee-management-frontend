@if (toastService.toast()) {
  <div class="fixed top-5 right-5 z-50 px-6 py-3 rounded-lg shadow-lg text-white text-sm font-medium transition-all"
    [ngClass]="{
      'bg-green-500': toastService.toast()?.type === 'success',
      'bg-red-500': toastService.toast()?.type === 'error',
      'bg-blue-500': toastService.toast()?.type === 'info'
    }">
    {{ toastService.toast()?.message }}
  </div>
}
